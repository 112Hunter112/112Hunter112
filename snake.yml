name: Generate Snake

on:
  schedule:
    # Regenerate twice a day
    - cron: "0 */12 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Themed to match the banner: cyan snake eating an amber/blue dot gradient
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#22d3ee&color_dots=#0a1426,#1e3a5f,#2563eb,#38bdf8,#fbbf24

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
